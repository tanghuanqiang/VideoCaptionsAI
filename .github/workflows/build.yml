name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run tests
        shell: bash
        run: |
          cd VideoSubs
          pip install pytest
          python -m pytest tests/unit_tests/ -v --tb=long

  build:
    name: Build Installer
    runs-on: windows-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Inno Setup
        shell: bash
        run: |
          curl -L -o innosetup.exe https://jrsoftware.org/download.php/is.exe
          ./innosetup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR="C:\InnoSetup"
          echo "C:\InnoSetup" >> $GITHUB_PATH

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('VideoSubs/requirements.txt') }}

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pnpm-cache
          key: ${{ runner.os }}-pnpm-${{ hashFiles('agentfront/pnpm-lock.yaml') }}

      - name: Install Python deps
        shell: bash
        run: |
          pip install -r VideoSubs/requirements.txt
          python -c "
import site, shutil, os
for sp in site.getsitepackages():
    p = os.path.join(sp, 'whisper', 'assets')
    if os.path.isdir(p):
        shutil.copytree(p, 'VideoSubs/whisper_assets', dirs_exist_ok=True)
        break
"

      - name: Build frontend
        shell: bash
        run: |
          cd agentfront
          pnpm install --frozen-lockfile
          pnpm build

      - name: Copy frontend
        shell: bash
        run: |
          mkdir -p VideoSubs/frontend_dist
          cp -r agentfront/dist/* VideoSubs/frontend_dist/

      - name: Build PyInstaller exe
        shell: bash
        run: |
          cd VideoSubs
          pyinstaller build_exe.spec --noconfirm

      - name: Build Inno Setup installer
        shell: bash
        run: |
          cd VideoSubs
          iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: VideoCaptionsAI-Setup
          path: VideoSubs\\VideoCaptionsAI_Setup.exe
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VideoCaptionsAI-Setup
      - uses: softprops/action-gh-release@v2
        with:
          files: VideoCaptionsAI_Setup.exe
          draft: false
          generate_release_notes: true
name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.pnpm-store
          key: ${{ runner.os }}-deps-${{ hashFiles('VideoSubs/requirements.txt', 'agentfront/pnpm-lock.yaml') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests
          pip install -r VideoSubs/requirements.txt
        continue-on-error: true

      - name: Run unit tests
        run: |
          cd VideoSubs
          python -m pytest tests/unit_tests/ -v --tb=short

  build:
    name: Build Installer
    runs-on: windows-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Inno Setup
        run: |
          curl -L -o innosetup.exe https://jrsoftware.org/download.php/is.exe
          .\innosetup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR="C:\InnoSetup"
          echo "C:\InnoSetup" >> $env:GITHUB_PATH

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r VideoSubs/requirements.txt
        continue-on-error: true

      - name: Build frontend
        run: |
          cd agentfront
          pnpm install --frozen-lockfile
          pnpm build

      - name: Copy frontend
        run: |
          Copy-Item -Recurse -Force agentfront\dist\* VideoSubs\frontend_dist\

      - name: Build PyInstaller exe
        run: |
          cd VideoSubs
          pyinstaller build_exe.spec --noconfirm

      - name: Build Inno Setup installer
        run: |
          cd VideoSubs
          iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: VideoCaptionsAI-Setup
          path: VideoSubs\VideoCaptionsAI_Setup.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VideoCaptionsAI-Setup

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: VideoCaptionsAI_Setup.exe
          draft: false
          generate_release_notes: true
name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run tests
        shell: bash
        run: |
          cd VideoSubs
          pip install pytest
          python -m pytest tests/unit_tests/ -v --tb=long

  build:
    name: Build Installer
    runs-on: windows-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        shell: bash
        run: |
          # Get version from git tag, or use default
          V=$(git describe --tags --abbrev=0 || echo "v1.0.0")
          # Remove 'v' prefix for Inno Setup
          V_num=${V#v}
          echo "VERSION=$V_num"
          echo "V=$V"
          echo "VERSION=$V_num" >> $GITHUB_OUTPUT
          echo "CleanVersion=${V_num}" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress --limit-output

      - name: Install Python deps
        shell: bash
        run: |
          pip install -r VideoSubs/requirements.txt
          python -c "import site, shutil, os; [(shutil.copytree(os.path.join(sp, 'whisper', 'assets'), 'VideoSubs/whisper_assets', dirs_exist_ok=True), print('Copied')) for sp in site.getsitepackages() if os.path.isdir(os.path.join(sp, 'whisper', 'assets'))]"

      - name: Build frontend
        shell: bash
        run: |
          cd agentfront
          pnpm install --frozen-lockfile
          pnpm build

      - name: Copy frontend
        shell: bash
        run: |
          mkdir -p VideoSubs/frontend_dist
          cp -r agentfront/dist/* VideoSubs/frontend_dist/

      - name: Build PyInstaller exe
        shell: pwsh
        run: |
          Set-Location VideoSubs
          pyinstaller build_exe.spec --noconfirm --log-level=WARN *>&1 | Tee-Object -FilePath pyinst_log.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "PyInstaller FAILED (exit $LASTEXITCODE). Last 80 lines of log:"
            Get-Content pyinst_log.txt -Tail 80
            exit 1
          }
          Write-Host "PyInstaller completed successfully"

      - name: Upload PyInstaller log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-log
          path: VideoSubs/pyinst_log.txt
          if-no-files-found: warn
          retention-days: 3

      - name: Build Inno Setup installer
        shell: bash
        run: |
          cd VideoSubs
          # Update version in installer.iss before build
          sed -i "s/^AppVersion=.*\\$/AppVersion=$VERSION/" installer.iss
          iscc installer.iss
          # Rename to include version
          mv VideoCaptionsAI_Setup.exe VideoCaptionsAI_$VERSION.exe
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: VideoCaptionsAI-Setup
          path: VideoSubs/VideoCaptionsAI_*.exe
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VideoCaptionsAI-Setup
      - uses: softprops/action-gh-release@v2
        with:
          files: VideoCaptionsAI_*.exe
          draft: false
          generate_release_notes: true



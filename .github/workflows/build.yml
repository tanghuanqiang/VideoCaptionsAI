name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run tests
        shell: bash
        run: |
          cd VideoSubs
          pip install pytest
          python -m pytest tests/unit_tests/ -v --tb=long

  build:
    name: Build Installer
    runs-on: windows-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress --limit-output

      - name: Install Python deps
        shell: bash
        run: |
          pip install -r VideoSubs/requirements.txt
          echo "Checking pyinstaller..."
          python -c "import PyInstaller; print(f'PyInstaller {PyInstaller.__version__}')"
          python -c "import site, shutil, os; [(shutil.copytree(os.path.join(sp, 'whisper', 'assets'), 'VideoSubs/whisper_assets', dirs_exist_ok=True), print('Copied')) for sp in site.getsitepackages() if os.path.isdir(os.path.join(sp, 'whisper', 'assets'))]"
          echo "Contents of VideoSubs/:"
          ls -la VideoSubs/whisper_assets/ || echo "whisper_assets not found"
          ls -la VideoSubs/frontend_dist/ || echo "frontend_dist not found yet"

      - name: Build frontend
        shell: bash
        run: |
          cd agentfront
          pnpm install --frozen-lockfile
          pnpm build

      - name: Copy frontend
        shell: bash
        run: |
          mkdir -p VideoSubs/frontend_dist
          cp -r agentfront/dist/* VideoSubs/frontend_dist/
          echo "Frontend dist contents:"
          ls -la VideoSubs/frontend_dist/

      - name: Build PyInstaller exe
        shell: bash
        run: |
          cd VideoSubs
          python -m PyInstaller build_exe.spec --noconfirm 2>&1 | tee pyinst_log.txt || true
          echo "PyInstaller exit code: ${PIPESTATUS=0}"

      - name: Upload PyInstaller log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-log
          path: VideoSubs/pyinst_log.txt
          retention-days: 3

      - name: Build Inno Setup installer
        if: always()
        shell: bash
        run: |
          cd VideoSubs
          iscc installer.iss || echo "Inno Setup skipped"

      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VideoCaptionsAI-Setup
          path: VideoSubs/VideoCaptionsAI_Setup.exe
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VideoCaptionsAI-Setup
      - uses: softprops/action-gh-release@v2
        with:
          files: VideoCaptionsAI_Setup.exe
          draft: false
          generate_release_notes: true